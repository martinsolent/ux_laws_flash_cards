<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX Laws — Flash Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Dark mode (default) ── */
  :root {
    --bg:          #0D1B2A;
    --bg2:         #152233;
    --amber:       #E8A838;
    --card-bg:     #F0EDE6;
    --card-back:   #1A2D42;
    --text-page:   #E8F0F8;
    --text-dark:   #0D1B2A;
    --text-muted:  #8FA8C0;
    --text-dim:    #5A7A99;
    --border-subtle: #1E3450;
    --border-mid:  #2A4060;
    --progress-track: #1A2D42;
    --filter-hover-border: #3A5A7A;
    --filter-hover-color: #BDD4EA;
    --back-text:   #B8CDE0;
    --illus-stroke: #0D1B2A;
    --card-desc-color: #4A5B70;
    --card-hint-color: #9AAABB;
    --tag-heuristic: #E8A838;
    --tag-gestalt:   #6DB88A;
    --tag-bias:      #C06B8A;
    --tag-principle: #5BA4CF;
  }

  /* ── Light mode ── */
  html[data-theme="light"] {
    --bg:          #F4F1EB;
    --bg2:         #EAE6DE;
    --amber:       #C47D10;
    --card-bg:     #FFFFFF;
    --card-back:   #1A2D42;
    --text-page:   #1A2635;
    --text-dark:   #0D1B2A;
    --text-muted:  #4A6580;
    --text-dim:    #7A8FA0;
    --border-subtle: #D4CBBC;
    --border-mid:  #B8CADC;
    --progress-track: #D8D2C8;
    --filter-hover-border: #8AAABB;
    --filter-hover-color: #1A3550;
    --back-text:   #B8CDE0;
    --illus-stroke: #1A2D42;
    --card-desc-color: #3A4F65;
    --card-hint-color: #7A8FA0;
    --tag-heuristic: #A05C00;
    --tag-gestalt:   #2A7A50;
    --tag-bias:      #8A3060;
    --tag-principle: #1A5A8A;
  }

  body {
    background: var(--bg);
    color: var(--text-page);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    transition: background 0.25s, color 0.25s;
  }

  header {
    max-width: 900px;
    margin: 0 auto 2.5rem;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }

  .header-text {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    line-height: 1.1;
    color: var(--text-page);
  }

  .subtitle {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
    max-width: 480px;
    line-height: 1.5;
  }

  /* ── Theme toggle ── */
  .theme-toggle {
    flex-shrink: 0;
    margin-top: 0.2rem;
    background: var(--bg2, #152233);
    border: 1.5px solid var(--border-subtle);
    border-radius: 100px;
    width: 52px;
    height: 28px;
    cursor: pointer;
    position: relative;
    transition: background 0.25s, border-color 0.25s;
    display: flex;
    align-items: center;
    padding: 0 4px;
  }

  .theme-toggle-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--amber);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), background 0.25s;
    transform: translateX(0);
    flex-shrink: 0;
  }

  html[data-theme="light"] .theme-toggle-thumb {
    transform: translateX(24px);
  }

  .theme-toggle-thumb svg {
    width: 12px;
    height: 12px;
    display: block;
  }

  /* icon visibility */
  .icon-moon { display: block; }
  .icon-sun  { display: none; }
  html[data-theme="light"] .icon-moon { display: none; }
  html[data-theme="light"] .icon-sun  { display: block; }

  .filters {
    max-width: 900px;
    margin: 0 auto 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
  }

  .filter-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-right: 0.25rem;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border-subtle);
    color: var(--text-muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 0.3rem 0.75rem;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--filter-hover-border); color: var(--filter-hover-color); }
  .filter-btn.active { border-color: var(--amber); color: var(--amber); background: rgba(232,168,56,0.08); }
  .filter-btn[data-cat="heuristic"].active { border-color: var(--tag-heuristic); color: var(--tag-heuristic); background: rgba(232,168,56,0.08); }
  .filter-btn[data-cat="gestalt"].active   { border-color: var(--tag-gestalt);   color: var(--tag-gestalt);   background: rgba(109,184,138,0.1); }
  .filter-btn[data-cat="bias"].active      { border-color: var(--tag-bias);      color: var(--tag-bias);      background: rgba(192,107,138,0.1); }
  .filter-btn[data-cat="principle"].active { border-color: var(--tag-principle); color: var(--tag-principle); background: rgba(91,164,207,0.1); }

  .grid {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  .card-wrap {
    perspective: 900px;
    height: 190px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-wrap.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .card-front {
    background: var(--card-bg);
    border: 1.5px solid var(--border-subtle);
    padding: 1.1rem 1.15rem;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 0.35rem;
    overflow: hidden;
    transition: background 0.25s, border-color 0.25s;
  }

  /* Illustration sits in top-right, spanning rows */
  .card-front-inner {
    display: grid;
    grid-template-columns: 1fr 72px;
    grid-template-rows: auto auto 1fr auto;
    gap: 0.35rem 0.5rem;
    height: 100%;
  }

  .card-front-left {
    grid-column: 1;
    grid-row: 1 / 5;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .card-illustration {
    grid-column: 2;
    grid-row: 1 / 4;
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
    padding-top: 0.1rem;
    opacity: 0.55;
  }

  .card-back {
    background: var(--card-back);
    border: 1.5px solid var(--border-mid);
    transform: rotateY(180deg);
    overflow: hidden;
    padding: 1.1rem 1.15rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .card-tag {
    display: inline-block;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.2rem 0.55rem;
    border-radius: 100px;
    width: fit-content;
  }

  .tag-heuristic { background: rgba(232,168,56,0.12); color: var(--tag-heuristic); }
  .tag-gestalt   { background: rgba(109,184,138,0.12); color: var(--tag-gestalt); }
  .tag-bias      { background: rgba(192,107,138,0.12); color: var(--tag-bias); }
  .tag-principle { background: rgba(91,164,207,0.12); color: var(--tag-principle); }

  .card-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1.2;
  }

  .card-desc {
    font-size: 0.78rem;
    color: var(--card-desc-color);
    line-height: 1.45;
    flex: 1;
  }

  .card-hint {
    font-size: 0.63rem;
    color: var(--card-hint-color);
    display: flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: auto;
  }

  .back-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
  }

  .back-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--amber);
    line-height: 1.2;
  }

  .back-close {
    background: rgba(255,255,255,0.07);
    border: none;
    color: #8FA8C0;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 0.65rem;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .back-body {
    font-size: 0.73rem;
    color: var(--back-text);
    line-height: 1.55;
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--border-mid) transparent;
  }

  .back-body::-webkit-scrollbar { width: 3px; }
  .back-body::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 4px; }

  .loading-dots { display: flex; gap: 4px; padding: 0.5rem 0; }
  .loading-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--amber);
    animation: dot-pulse 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .error-msg { color: #C06B8A; font-size: 0.72rem; }

  .progress-bar {
    max-width: 900px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .progress-track {
    flex: 1; height: 3px; background: var(--progress-track); border-radius: 2px; overflow: hidden;
  }

  .progress-fill {
    height: 100%; background: var(--amber); border-radius: 2px; transition: width 0.3s;
  }

  .progress-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.7rem; font-weight: 600; color: var(--text-dim); white-space: nowrap;
  }
  .progress-label span { color: var(--amber); }

  @media (prefers-reduced-motion: reduce) {
    .card-inner { transition: none; }
    .loading-dots span { animation: none; opacity: 0.6; }
  }
  @media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-text">
    <p class="eyebrow">Study Tool</p>
    <h1>UX Laws</h1>
    <p class="subtitle">Tap a card to get an explanation with a real UI example. Filter by category to focus your study.</p>
  </div>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode">
    <div class="theme-toggle-thumb">
      <svg class="icon-moon" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 7.5A5 5 0 014.5 2c0-.17.01-.34.03-.5A5 5 0 1010 7.5z" stroke="#0D1B2A" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg class="icon-sun" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="6" cy="6" r="2.2" stroke="#0D1B2A" stroke-width="1.1"/>
        <line x1="6" y1="1" x2="6" y2="2.2" stroke="#0D1B2A" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="6" y1="9.8" x2="6" y2="11" stroke="#0D1B2A" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="1" y1="6" x2="2.2" y2="6" stroke="#0D1B2A" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="9.8" y1="6" x2="11" y2="6" stroke="#0D1B2A" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="2.64" y1="2.64" x2="3.5" y2="3.5" stroke="#0D1B2A" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="8.5" y1="8.5" x2="9.36" y2="9.36" stroke="#0D1B2A" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="9.36" y1="2.64" x2="8.5" y2="3.5" stroke="#0D1B2A" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="3.5" y1="8.5" x2="2.64" y2="9.36" stroke="#0D1B2A" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
    </div>
  </button>
</header>

<div class="filters" id="filters">
  <span class="filter-label">Filter</span>
  <button class="filter-btn active" data-cat="all">All (20)</button>
  <button class="filter-btn" data-cat="heuristic">Heuristics &amp; Interaction</button>
  <button class="filter-btn" data-cat="gestalt">Gestalt</button>
  <button class="filter-btn" data-cat="bias">Cognitive Bias</button>
  <button class="filter-btn" data-cat="principle">Additional Principles</button>
</div>

<div class="progress-bar">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <p class="progress-label"><span id="progressCount">0</span> / <span id="progressTotal">20</span> reviewed</p>
</div>

<div class="grid" id="grid"></div>

    <rect x="38" y="30" width="5" height="4" rx="1" stroke="#0D1B2A" stroke-width="1"/>
    <rect x="63" y="30" width="5" height="4" rx="1" stroke="#0D1B2A" stroke-width="1"/>
    <rect x="41" y="20" width="4" height="5" rx="1" stroke="#0D1B2A" stroke-width="1" transform="rotate(45 43 22)"/>
    <rect x="63" y="20" width="4" height="5" rx="1" stroke="#0D1B2A" stroke-width="1" transform="rotate(-45 65 22)"/>
    <!-- User bucket — simple button -->
    <rect x="4" y="24" width="22" height="16" rx="4" stroke="#0D1B2A" stroke-width="1.4"/>
    <rect x="8" y="28" width="14" height="8" rx="2" stroke="#0D1B2A" stroke-width="1.1"/>
    <!-- Transfer arrow: complexity moves from user to system -->
    <path d="M30 28 C33 24 34 22 38 22" stroke="#0D1B2A" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <path d="M35 19 L38 22 L35 25" stroke="#0D1B2A" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="4" y="52" font-family="Space Grotesk, sans-serif" font-size="7" fill="#0D1B2A">user: simple</text>
    <text x="36" y="52" font-family="Space Grotesk, sans-serif" font-size="7" fill="#0D1B2A">system: handles it</text>
  </svg>`
};

const LAWS = [
  { id: "aesthetic-usability", title: "Aesthetic‑Usability Effect", desc: "Attractive designs feel easier to use.", cat: "heuristic" },
  { id: "fitts",     title: "Fitts's Law",             desc: "Bigger, closer targets are faster to click.", cat: "heuristic" },
  { id: "hick",      title: "Hick's Law",              desc: "More choices slow decision‑making.", cat: "heuristic" },
  { id: "jakob",     title: "Jakob's Law",             desc: "Users prefer familiar patterns.", cat: "heuristic" },
  { id: "miller",    title: "Miller's Law",            desc: "People can hold ~7 items in working memory.", cat: "heuristic" },
  { id: "parkinson", title: "Parkinson's Law",         desc: "Tasks expand to fill the time available.", cat: "heuristic" },
  { id: "proximity", title: "Law of Proximity",        desc: "Items close together seem related.", cat: "gestalt" },
  { id: "similarity",title: "Law of Similarity",       desc: "Similar items appear grouped.", cat: "gestalt" },
  { id: "region",    title: "Law of Common Region",    desc: "Elements in the same area feel grouped.", cat: "gestalt" },
  { id: "pragnanz",  title: "Law of Prägnanz",         desc: "People prefer simple, clear forms.", cat: "gestalt" },
  { id: "connectedness", title: "Law of Uniform Connectedness", desc: "Connected elements feel related.", cat: "gestalt" },
  { id: "peak-end",  title: "Peak‑End Rule",           desc: "People remember the peak and the end of an experience.", cat: "bias" },
  { id: "serial",    title: "Serial Position Effect",  desc: "First and last items are remembered best.", cat: "bias" },
  { id: "vonrestorff", title: "Von Restorff Effect",   desc: "Unique items stand out and are remembered.", cat: "bias" },
  { id: "zeigarnik", title: "Zeigarnik Effect",        desc: "People remember unfinished tasks better.", cat: "bias" },
  { id: "doherty",   title: "Doherty Threshold",       desc: "Interfaces feel better when responses happen under 400ms.", cat: "principle" },
  { id: "occam",     title: "Occam's Razor",           desc: "Simpler solutions are usually better.", cat: "principle" },
  { id: "pareto",    title: "Pareto Principle",        desc: "80% of value comes from 20% of features.", cat: "principle" },
  { id: "postel",    title: "Postel's Law",            desc: "Be flexible in what you accept, strict in what you output.", cat: "principle" },
  { id: "tesler",    title: "Tesler's Law",            desc: "Every system has irreducible complexity; someone must handle it.", cat: "principle" },
];

const TAG_LABELS = {
  heuristic: "Heuristics & Interaction",
  gestalt: "Gestalt",
  bias: "Cognitive Bias",
  principle: "Additional Principles"
};

const cache = {};
const reviewed = new Set();
let currentFilter = "all";

function updateProgress() {
  const visible = currentFilter === "all" ? LAWS : LAWS.filter(l => l.cat === currentFilter);
  const reviewedVisible = visible.filter(l => reviewed.has(l.id)).length;
  document.getElementById("progressCount").textContent = reviewedVisible;
  document.getElementById("progressTotal").textContent = visible.length;
  document.getElementById("progressFill").style.width = visible.length ? (reviewedVisible / visible.length * 100) + "%" : "0%";
}

async function fetchExplanation(law) {
  if (cache[law.id]) return cache[law.id];

  const prompt = `You are a UX educator. In 3–4 sentences, explain "${law.title}" for a computing undergraduate. First sentence: what the principle means. Second sentence: why it happens cognitively or perceptually. Third sentence: give one specific, concrete UI or product example (name a real app, website, or interface). Keep every sentence short. No lists. No headers. Plain prose only.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });

  const data = await response.json();
  if (!response.ok) throw new Error(data.error?.message || "API error");
  const text = data.content.map(b => b.text || "").join("").trim();
  cache[law.id] = text;
  return text;
}

function buildCard(law) {
  const wrap = document.createElement("div");
  wrap.className = "card-wrap";
  wrap.dataset.id = law.id;
  wrap.dataset.cat = law.cat;

  const illustration = ILLUSTRATIONS[law.id] || "";

  wrap.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-front">
        <div class="card-front-inner">
          <div class="card-front-left">
            <span class="card-tag tag-${law.cat}">${TAG_LABELS[law.cat]}</span>
            <p class="card-title">${law.title}</p>
            <p class="card-desc">${law.desc}</p>
            <p class="card-hint">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4.5" stroke="#8FA8C0"/><path d="M5 4v3M5 3h.01" stroke="#8FA8C0" stroke-linecap="round"/></svg>
              Tap for an AI explanation
            </p>
          </div>
          <div class="card-illustration">${illustration}</div>
        </div>
      </div>
      <div class="card-face card-back">
        <div class="back-header">
          <p class="back-title">${law.title}</p>
          <button class="back-close" aria-label="Close">✕</button>
        </div>
        <div class="back-body">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>
  `;

  wrap.addEventListener("click", async (e) => {
    const closeBtn = e.target.closest(".back-close");
    const isFlipped = wrap.classList.contains("flipped");

    if (closeBtn || isFlipped) {
      wrap.classList.remove("flipped");
      return;
    }

    wrap.classList.add("flipped");
    reviewed.add(law.id);
    updateProgress();

    const bodyEl = wrap.querySelector(".back-body");

    if (cache[law.id]) {
      bodyEl.textContent = cache[law.id];
      return;
    }

    bodyEl.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

    try {
      const text = await fetchExplanation(law);
      bodyEl.textContent = text;
    } catch (err) {
      bodyEl.innerHTML = `<span class="error-msg">Could not load explanation. Check your connection and try again.</span>`;
    }
  });

  return wrap;
}

function renderCards() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const toShow = currentFilter === "all" ? LAWS : LAWS.filter(l => l.cat === currentFilter);
  toShow.forEach(law => grid.appendChild(buildCard(law)));
  updateProgress();
}

document.getElementById("filters").addEventListener("click", (e) => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentFilter = btn.dataset.cat;
  renderCards();
});

renderCards();

// ── Theme toggle ──
(function() {
  const html = document.documentElement;
  const btn  = document.getElementById('themeToggle');
  const saved = localStorage.getItem('ux-theme');
  if (saved === 'light') html.setAttribute('data-theme', 'light');

  function updateIllusStrokes() {
    const stroke = getComputedStyle(html).getPropertyValue('--illus-stroke').trim() || '#0D1B2A';
    document.querySelectorAll('.card-illustration svg [stroke]').forEach(el => {
      const s = el.getAttribute('stroke');
      if (s && s !== 'none') el.setAttribute('stroke', stroke);
    });
    document.querySelectorAll('.card-illustration svg [fill]').forEach(el => {
      const f = el.getAttribute('fill');
      if (f && f !== 'none') el.setAttribute('fill', stroke);
    });
  }

  btn.addEventListener('click', () => {
    const isLight = html.getAttribute('data-theme') === 'light';
    if (isLight) {
      html.removeAttribute('data-theme');
      localStorage.setItem('ux-theme', 'dark');
    } else {
      html.setAttribute('data-theme', 'light');
      localStorage.setItem('ux-theme', 'light');
    }
    updateIllusStrokes();
  });

  updateIllusStrokes();
})();
</script>
